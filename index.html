<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>IMDA × AI Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
  <!-- !! FIGMA SYNC — do not remove: enables "Send to Figma" toolbar for re-capture !! -->
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>

  <style>
    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design Tokens ──────────────────────────────── */
    :root {
      --accent:         #DB0B5B;
      --accent-glow:    rgba(219, 11, 91, 0.35);
      --accent-subtle:  rgba(219, 11, 91, 0.12);
      --bg:             #0D0D0D;
      --bg-card:        #141414;
      --bg-card-hover:  #1A1A1A;
      --border:         rgba(255, 255, 255, 0.08);
      --border-accent:  rgba(219, 11, 91, 0.45);
      --text-primary:   #FFFFFF;
      --text-dim:       rgba(255, 255, 255, 0.45);
      --text-sub:       rgba(255, 255, 255, 0.65);
      --font:           'Inter', system-ui, sans-serif;
      --radius-card:    20px;
      --radius-icon:    14px;

      --h-header: 20dvh;
      --h-cards:  65dvh;
      --h-footer: 15dvh;
    }

    /* ─── Base ───────────────────────────────────────── */
    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    /* ─── Screen Wrapper ────────────────────────────── */
    .screen {
      display: flex;
      flex-direction: column;
      width: min(100vw, 700px);
      height: 100dvh;
      margin-inline: auto;
      overflow: hidden;
      position: relative;
    }

    /* Subtle radial gradient backdrop */
    .screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(219,11,91,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(219,11,91,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .screen > * { position: relative; z-index: 1; }

    /* ─── HEADER ────────────────────────────────────── */
    .header {
      flex: 0 0 var(--h-header);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 2.5dvh, 2.5rem) clamp(1.5rem, 4dvh, 3rem);
      text-align: center;
      gap: 0.5rem;
    }

    .header-eyebrow {
      font-size: clamp(0.75rem, 1.6dvh, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .header-question {
      font-size: clamp(2rem, 5dvh, 5rem);
      font-weight: 700;
      line-height: 1.12;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    /* ─── CARDS SECTION ────────────────────────────── */
    .cards {
      flex: 0 0 var(--h-cards);
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 1dvh, 16px);
      padding: 0 clamp(1rem, 3dvh, 2.5rem);
    }

    /* ─── CARD ──────────────────────────────────────── */
    .card {
      flex: 1;
      display: flex;
      align-items: center;
      padding: clamp(0.8rem, 2dvh, 2rem) clamp(1rem, 2.5dvh, 2rem);
      background: var(--bg-card);
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      outline: none;
      transition:
        transform        180ms cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow       180ms ease,
        border-color     180ms ease,
        background-color 180ms ease;
      text-decoration: none;
    }

    .card:focus-visible {
      box-shadow: 0 0 0 3px var(--accent);
    }

    .card:active,
    .card.pressed {
      transform: scale(0.975);
      background-color: var(--bg-card-hover);
      border-left-color: var(--accent);
      border-color: var(--border-accent);
      box-shadow:
        0 0 28px var(--accent-glow),
        inset 0 0 0 1px var(--border-accent);
    }

    /* Icon slot */
    .card-icon-wrap {
      flex-shrink: 0;
      width: clamp(44px, 6dvh, 72px);
      height: clamp(44px, 6dvh, 72px);
      background: var(--accent-subtle);
      border-radius: var(--radius-icon);
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 10px var(--accent-glow));
      transition: filter 180ms ease;
    }

    .card:active .card-icon-wrap,
    .card.pressed .card-icon-wrap {
      filter: drop-shadow(0 0 16px rgba(219,11,91,0.65));
    }

    .card-icon-wrap svg {
      width: 55%;
      height: 55%;
    }

    /* Text slot */
    .card-text {
      flex: 1;
      margin: 0 clamp(0.8rem, 2dvh, 1.6rem);
      min-width: 0;
    }

    .card-label {
      font-size: clamp(1.1rem, 2.6dvh, 2.2rem);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .card-sub {
      font-size: clamp(0.8rem, 1.7dvh, 1.3rem);
      font-weight: 400;
      color: var(--text-sub);
      margin-top: 0.3em;
      line-height: 1.4;
    }

    /* Chevron slot */
    .card-chevron {
      flex-shrink: 0;
      width: clamp(20px, 2.8dvh, 32px);
      height: clamp(20px, 2.8dvh, 32px);
      color: var(--text-dim);
      transition: color 180ms ease, transform 180ms ease;
    }

    .card:active .card-chevron,
    .card.pressed .card-chevron {
      color: var(--accent);
      transform: translateX(4px);
    }

    /* ─── FOOTER ────────────────────────────────────── */
    .footer {
      flex: 0 0 var(--h-footer);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 clamp(1rem, 4vw, 2rem) clamp(0.5rem, 1.5vh, 1rem);
      padding-bottom: max(clamp(0.5rem, 1.5vh, 1rem), env(safe-area-inset-bottom, 0px));
      gap: 0.5rem;
      text-align: center;
    }

    /* Safe zone: footer content lives in top 66% of footer zone */
    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 5%; /* push content away from bottom 5% dead zone */
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: clamp(0.35rem, 0.8dvh, 0.6rem);
      font-size: clamp(0.9rem, 1.8dvh, 1.5rem);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.04em;
    }

    .footer-logo {
      width: clamp(32px, 5dvh, 52px);
      height: clamp(32px, 5dvh, 52px);
      flex-shrink: 0;
    }

    .footer-logo svg {
      width: 100%;
      height: 100%;
    }

    .footer-sep {
      opacity: 0.4;
      font-weight: 400;
    }

    .footer-brand-dot {
      display: inline-block;
      width: clamp(5px, 0.7dvh, 8px);
      height: clamp(5px, 0.7dvh, 8px);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .footer-hint {
      font-size: clamp(0.75rem, 1.4dvh, 1.1rem);
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.01em;
    }

    /* ─── Idle Attract Animation ────────────────────── */
    @keyframes pulse-glow {
      0%, 100% {
        box-shadow: none;
        border-color: var(--border);
      }
      50% {
        box-shadow: 0 0 32px var(--accent-glow);
        border-color: var(--border-accent);
      }
    }

    .card.attract {
      animation: pulse-glow 2.4s ease-in-out infinite;
    }

    /* ─── Divider line in header ────────────────────── */
    .header-rule {
      width: clamp(32px, 5vw, 48px);
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--accent-glow);
      margin-top: 0.3rem;
    }
  </style>
</head>

  <script>
    (function () {
      'use strict';

      const cards = document.querySelectorAll('.card');
      let idleTimer = null;
      let attractActive = false;

      /* ── Card interaction ── */
      cards.forEach(function (card) {
        // Touch / pointer handler
        card.addEventListener('pointerup', function (e) {
          if (e.pointerType === 'mouse' && e.button !== 0) return;
          navigate(card.dataset.goal);
        });

        // Keyboard handler
        card.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            navigate(card.dataset.goal);
          }
        });
      });

      function navigate(goal) {
        if (goal === 'content') {
          window.location.href = 'screen3.html';
          return;
        }
        if (goal === 'engagement') {
          window.location.href = 'screen2.html';
          return;
        }

        console.log('[kiosk] selected goal:', goal);

        // Visual feedback for unimplemented goals
        const card = document.querySelector('[data-goal="' + goal + '"]');
        if (card) {
          card.classList.add('pressed');
          setTimeout(function () { card.classList.remove('pressed'); }, 350);
        }
      }

      /* ── Idle attract loop ── */
      function startAttract() {
        if (attractActive) return;
        attractActive = true;
        cards.forEach(function (card, i) {
          card.style.animationDelay = (i * 0.8) + 's';
          card.classList.add('attract');
        });
      }

      function stopAttract() {
        if (!attractActive) return;
        attractActive = false;
        cards.forEach(function (card) {
          card.style.animationDelay = '';
          card.classList.remove('attract');
        });
      }

      function resetIdleTimer() {
        stopAttract();
        clearTimeout(idleTimer);
        idleTimer = setTimeout(startAttract, 30000); // 30 seconds
      }

      document.addEventListener('pointerdown', resetIdleTimer);
      document.addEventListener('keydown', resetIdleTimer);

      resetIdleTimer(); // kick off on load
    })();
  </script>
</body>
</html>
